<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pxc-share · Hello World</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #0f0c29;
      --bg-mid:  #302b63;
      --bg-to:   #24243e;
      --card-bg: rgba(255, 255, 255, 0.07);
      --card-border: rgba(255, 255, 255, 0.15);
      --accent: #a78bfa;
      --text: #f1f5f9;
      --sub: #94a3b8;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-mid), var(--bg-to));
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      padding: 3rem 4rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      animation: fadeUp 0.6s ease both;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--accent), #818cf8);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #e2e8f0, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      color: var(--sub);
      font-size: 1rem;
      line-height: 1.6;
    }

    .divider {
      width: 3rem;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 2px;
      margin: 1.5rem auto;
    }

    .stack {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1.75rem;
    }

    .pill {
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      color: var(--sub);
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">pxc-share</span>
    <h1>{{ message }}</h1>
    <div class="divider"></div>
    <p>A minimal Flask + Jinja2 starter.<br>Edit <code>app.py</code> and <code>templates/index.html</code> to get going.</p>
    <div class="stack">
      <span class="pill">Python</span>
      <span class="pill">Flask</span>
      <span class="pill">Jinja2</span>
      <span class="pill">HTML &amp; CSS</span>
    </div>
  </div>
</body>
</html>
